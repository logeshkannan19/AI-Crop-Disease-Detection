name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run linter
        run: |
          pip install pylint
          pylint backend/app --disable=all --enable=E || true
          
      - name: Run tests
        run: |
          pytest tests/ -v || true

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install
          
      - name: Build
        working-directory: ./frontend
        run: npm run build
          
      - name: Run linter
        working-directory: ./frontend
        run: npm run lint || true

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Backend Docker
        run: |
          docker build -f backend/Dockerfile -t agriscan-backend:latest .
          
      - name: Build Frontend Docker
        run: |
          docker build -f frontend/Dockerfile -t agriscan-frontend:latest .